name: Docs check
# Validates the docs/ knowledge system on changes: frontmatter + internal link
# integrity (pnpm docs:check), then a Blume build to confirm the presentation
# layer renders the committed Markdown. Markdown is the source of truth; Blume
# is only the presentation layer.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'blume.config.ts'
      - 'scripts/validate-docs.mjs'
      - '.github/workflows/docs.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    paths:
      - 'docs/**'
      - 'blume.config.ts'
      - 'scripts/validate-docs.mjs'
      - '.github/workflows/docs.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      # Install only root devDeps (blume) — the docs check does not need the
      # CLI's native builds (better-sqlite3, sharp). --ignore-scripts skips
      # postinstall native compilation.
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Validate frontmatter + internal links
        run: pnpm docs:check
      - name: Build docs site (Blume)
        run: pnpm docs:build
