name = "saasmaker-dashboard"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
main = "worker.mjs"
# Serve overlaid Astro index.html for GET / without invoking the Worker.
assets = { directory = ".open-next/assets", binding = "ASSETS", run_worker_first = [ "/*", "!/" ] }

# Self-reference for OpenNext incremental cache tag-based revalidation
services = [
  { binding = "WORKER_SELF_REFERENCE", service = "saasmaker-dashboard" }
]

# R2 bucket for OpenNext incremental cache (ISR/SSR output caching)
[[r2_buckets]]
binding = "NEXT_INC_CACHE_R2_BUCKET"
bucket_name = "saasmaker-dashboard-opennext-cache"

routes = [
  { pattern = "app.sassmaker.com/*", zone_name = "sassmaker.com" }
]

[vars]
AUTH_URL = "https://app.sassmaker.com"
NEXT_PUBLIC_API_URL = "https://api.sassmaker.com"
NEXT_PUBLIC_SITE_URL = "https://app.sassmaker.com"
DROID_API_URL = "https://saasmaker-droid.sarthakagrawal927.workers.dev"
NODE_ENV = "production"

[[d1_databases]]
binding = "DB"
database_name = "saasmaker-db"
database_id = "4fe6cffc-593a-4540-9577-1c33e8c64491"
