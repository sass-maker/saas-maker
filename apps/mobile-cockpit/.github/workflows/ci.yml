name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build:bridge
      - run: pnpm mobile:export
      - run: pnpm mobile:export:ios

  ios-native:
    name: iOS Simulator build
    runs-on: macos-26
    timeout-minutes: 45
    env:
      CI: 1
      DEVELOPER_DIR: /Applications/Xcode_26.4.app/Contents/Developer
      EXPO_NO_TELEMETRY: 1
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate the native iOS project
        run: pnpm --filter @mobile-dev-cockpit/mobile exec expo prebuild --platform ios --no-install
      - name: Install iOS pods
        working-directory: apps/mobile/ios
        run: pod install
      - name: Compile for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -workspace apps/mobile/ios/MobileDevCockpit.xcworkspace \
            -scheme MobileDevCockpit \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/MobileDevCockpitDerivedData" \
            build
      - name: Verify simulator Keychain entitlement
        run: |
          SIMULATED_ENTITLEMENTS="$(find "$RUNNER_TEMP/MobileDevCockpitDerivedData/Build/Intermediates.noindex" -name 'MobileDevCockpit.app-Simulated.xcent' -print -quit)"
          test -n "$SIMULATED_ENTITLEMENTS"
          /usr/libexec/PlistBuddy -c 'Print :application-identifier' "$SIMULATED_ENTITLEMENTS"
      - name: Launch the standalone app in iOS Simulator
        run: |
          DEVICE_ID="$(
            xcrun simctl list devices available -j |
              ruby -rjson -e 'devices = JSON.parse(STDIN.read).fetch("devices").values.flatten; device = devices.find { |item| item["isAvailable"] }; abort("No available iOS Simulator device") unless device; puts device.fetch("udid")'
          )"
          xcrun simctl boot "$DEVICE_ID" 2>/dev/null || true
          xcrun simctl bootstatus "$DEVICE_ID" -b

          APP_PATH="$(find "$RUNNER_TEMP/MobileDevCockpitDerivedData/Build/Products/Release-iphonesimulator" -maxdepth 1 -name '*.app' -print -quit)"
          test -n "$APP_PATH"
          xcrun simctl install "$DEVICE_ID" "$APP_PATH"
          xcrun simctl launch --terminate-running-process "$DEVICE_ID" dev.sarthak.mobiledevcockpit
          sleep 8
          xcrun simctl io "$DEVICE_ID" screenshot "$RUNNER_TEMP/mobile-dev-cockpit-simulator.png"
      - name: Upload the native launch screenshot
        uses: actions/upload-artifact@v4
        with:
          name: mobile-dev-cockpit-ios-simulator
          path: ${{ runner.temp }}/mobile-dev-cockpit-simulator.png
          if-no-files-found: error
