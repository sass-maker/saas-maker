# Cloudflare Pages config for the sassmaker.com landing page.
#
# Pure-static deploy (output: "static" in astro.config.mjs).
# `wrangler pages deploy` and the Cloudflare dashboard both pick this
# file up to find the build output. The CF Pages project name MUST stay
# `saas-maker-home` so the existing custom domain (sassmaker.com) keeps
# resolving — same project, new build output.
name = "saas-maker-home"
compatibility_date = "2026-06-04"
pages_build_output_dir = "dist"
