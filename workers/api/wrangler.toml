name = "saasmaker-api"
main = "src/index.ts"
compatibility_date = "2026-02-22"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[observability]
enabled = true
head_sampling_rate = 0.1

[limits]
cpu_ms = 30000

[ai]
binding = "AI"

[[r2_buckets]]
binding = "FEEDBACK_IMAGES"
bucket_name = "saasmaker-feedback-images"

[[d1_databases]]
binding = "DB"
database_name = "saasmaker-db"
database_id = "4fe6cffc-593a-4540-9577-1c33e8c64491"

# Custom domain — requires sassmaker.com on Cloudflare DNS
[[routes]]
pattern = "api.sassmaker.com"
custom_domain = true
