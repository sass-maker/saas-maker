name = "saasmaker-api"
main = "src/index.ts"
compatibility_date = "2026-02-22"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[observability]
enabled = true

[ai]
binding = "AI"

[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 1000, period = 60 }

[[r2_buckets]]
binding = "FEEDBACK_IMAGES"
bucket_name = "saasmaker-feedback-images"

[[d1_databases]]
binding = "DB"
database_name = "saasmaker-db"
database_id = "4fe6cffc-593a-4540-9577-1c33e8c64491"

# Custom domain — requires sassmaker.com on Cloudflare DNS
[[routes]]
pattern = "api.sassmaker.com"
custom_domain = true
