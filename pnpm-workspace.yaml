packages:
  - 'packages/widgets/feedback-widget'
  - 'packages/ui'
  - 'apps/cockpit'
  - 'apps/docs-blume'
  - 'apps/showcase'
  - 'apps/cockpit/landing-astro'
  - 'workers/api'
allowBuilds:
  core-js: true
  esbuild: true
  msw: true
  protobufjs: true
  sharp: false
  unrs-resolver: true
  workerd: true
# Supply-chain release-age policy: pin rollup to a vetted version even
# when Astro pulls a fresher one transitively. See fleet AGENTS.md →
# release-age policy.
overrides:
  rollup: 4.60.2
