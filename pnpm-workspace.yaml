packages:
  - 'packages/tooling/*'
  - 'packages/blocks/*'
  - 'packages/widgets/*'
  - 'packages/cli'
  - 'packages/ui'
  - 'apps/*'
  - 'workers/*'
allowBuilds:
  core-js: true
  esbuild: true
  msw: true
  protobufjs: true
  sharp: false
  unrs-resolver: true
  workerd: true
# Supply-chain release-age policy: pin rollup to a vetted version even
# when Astro pulls a fresher one transitively. See fleet AGENTS.md →
# release-age policy.
overrides:
  rollup: 4.60.2
