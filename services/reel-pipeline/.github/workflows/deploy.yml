name: Deploy artifacts worker

# Artifact-only deploy: this Worker (reel-pipeline-artifacts) has no public
# custom domain — it is an internal artifacts surface. No post-deploy smoke
# check is applicable; the Worker is exercised by upstream callers.
# Rollback: `wrangler versions rollback --config wrangler.jsonc` from the repo
# root, or via dash.cloudflare.com → Workers → reel-pipeline-artifacts →
# Versions → "Rollback".

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-artifacts-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Cloudflare Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.109.0"
          command: deploy --config wrangler.jsonc
