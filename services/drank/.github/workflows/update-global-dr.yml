name: Update Global DR History

on:
  schedule:
    # Run every Monday at ~04:00 UTC
    - cron: '0 4 * * 1'
  workflow_dispatch: {}

jobs:
  update-dr:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # So we can commit back
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update global DR data
        run: node scripts/update-global-dr.mjs

      - name: Update Fleet domain DR data
        run: node scripts/update-global-dr.mjs --sites data/fleet-sites.json --data data/fleet-dr.json --label fleet

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp data/global-dr.json data/fleet-dr.json public/data/
          git add data/global-dr.json data/fleet-dr.json public/data/global-dr.json public/data/fleet-dr.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(dr): weekly update global DR history"
            git push
            echo "Committed and pushed updated global-dr.json"
          fi
