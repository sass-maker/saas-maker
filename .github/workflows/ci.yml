name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run build
      - name: Check bundle size
        run: pnpm run size

  docs:
    name: docs (link check + blume build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: |
            pnpm-lock.yaml
            docs-site/pnpm-lock.yaml

      - name: Docs internal-link check
        run: python3 scripts/check_docs_links.py

      - name: Install docs-site deps
        working-directory: docs-site
        run: pnpm install --frozen-lockfile || pnpm install

      - name: Blume build
        working-directory: docs-site
        run: pnpm run build

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Rollback: Cloudflare Pages preserves every deployment. Roll back via
    # dash.cloudflare.com → Pages → drank → Deployments → "Rollback to this
    # deployment".
    concurrency:
      group: deploy-drank-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy out
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Smoke production
        run: curl --fail --silent --show-error --location --output /dev/null --retry 5 --retry-delay 5 --max-time 20 https://domains.sassmaker.com/
