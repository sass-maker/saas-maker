name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm check:openapi
      - run: pnpm build:types
      - run: pnpm build:db
      - run: pnpm build:email
      - run: pnpm build:widget
      - run: pnpm build:analytics-ui
      - run: pnpm -F @saas-maker/api typecheck
      - run: pnpm build:cockpit
      - run: pnpm test

  deploy-api:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check API deploy paths
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.before }}"
          if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed=false
          while IFS= read -r path; do
            case "$path" in
              workers/api/*|packages/blocks/db/*|packages/blocks/email/*|packages/blocks/ops/*|packages/blocks/shared-types/*|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|.github/workflows/ci.yml)
                changed=true
                break
                ;;
            esac
          done < <(git diff --name-only "$base" "${{ github.sha }}")

          echo "changed=$changed" >> "$GITHUB_OUTPUT"
      - name: Skip API deploy
        if: steps.changes.outputs.changed != 'true'
        run: echo "No API-owned paths changed; skipping saasmaker-api deploy."
      - uses: pnpm/action-setup@v6
        if: steps.changes.outputs.changed == 'true'
        with:
          version: 10
      - uses: actions/setup-node@v6
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
        if: steps.changes.outputs.changed == 'true'
      - run: pnpm build:types
        if: steps.changes.outputs.changed == 'true'
      - run: pnpm build:db
        if: steps.changes.outputs.changed == 'true'
      - run: pnpm build:email
        if: steps.changes.outputs.changed == 'true'
      - name: Deploy API to Cloudflare Workers
        if: steps.changes.outputs.changed == 'true'
        run: cd workers/api && pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Smoke production API and cockpit
        if: steps.changes.outputs.changed == 'true'
        run: pnpm smoke

  deploy-droid:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check Droid deploy paths
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.before }}"
          if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed=false
          while IFS= read -r path; do
            case "$path" in
              workers/droid/*|workers/droid/**|workers/api/migrations/*droid*|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|.github/workflows/ci.yml)
                changed=true
                break
                ;;
            esac
          done < <(git diff --name-only "$base" "${{ github.sha }}")

          echo "changed=$changed" >> "$GITHUB_OUTPUT"
      - name: Skip Droid deploy
        if: steps.changes.outputs.changed != 'true'
        run: echo "No Droid-owned paths changed; skipping saasmaker-droid deploy."
      - uses: pnpm/action-setup@v6
        if: steps.changes.outputs.changed == 'true'
        with:
          version: 10
      - uses: actions/setup-node@v6
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
        if: steps.changes.outputs.changed == 'true'
      - name: Deploy Droid to Cloudflare Workers
        if: steps.changes.outputs.changed == 'true'
        run: pnpm -F @saas-maker/droid run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-cockpit:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check cockpit deploy paths
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.before }}"
          if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed=false
          while IFS= read -r path; do
            case "$path" in
              apps/cockpit/*|apps/cockpit/**|packages/blocks/sdk/*|packages/blocks/sdk/**|packages/blocks/shared-types/*|packages/blocks/shared-types/**|packages/blocks/analytics-ui/*|packages/blocks/analytics-ui/**|packages/ui/*|packages/ui/**|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|.github/workflows/ci.yml)
                changed=true
                break
                ;;
            esac
          done < <(git diff --name-only "$base" "${{ github.sha }}")

          echo "changed=$changed" >> "$GITHUB_OUTPUT"
      - name: Skip cockpit deploy
        if: steps.changes.outputs.changed != 'true'
        run: echo "No cockpit-owned paths changed; skipping saasmaker-dashboard deploy."
      - uses: pnpm/action-setup@v6
        if: steps.changes.outputs.changed == 'true'
        with:
          version: 10
      - uses: actions/setup-node@v6
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
        if: steps.changes.outputs.changed == 'true'
      - name: Deploy cockpit to Cloudflare Workers
        if: steps.changes.outputs.changed == 'true'
        run: pnpm -F @saas-maker/dashboard run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-landing:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check home deploy paths
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.before }}"
          if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed=false
          while IFS= read -r path; do
            case "$path" in
              apps/showcase/*|packages/blocks/sdk/*|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|.github/workflows/ci.yml)
                changed=true
                break
                ;;
            esac
          done < <(git diff --name-only "$base" "${{ github.sha }}")

          echo "changed=$changed" >> "$GITHUB_OUTPUT"
      - name: Skip home deploy
        if: steps.changes.outputs.changed != 'true'
        run: echo "No home-owned paths changed; skipping saas-maker-home deploy."
      - uses: pnpm/action-setup@v6
        if: steps.changes.outputs.changed == 'true'
        with:
          version: 10
      - uses: actions/setup-node@v6
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
        if: steps.changes.outputs.changed == 'true'
      - run: pnpm build:showcase
        if: steps.changes.outputs.changed == 'true'
      - name: Deploy landing page to Cloudflare Pages
        if: steps.changes.outputs.changed == 'true'
        run: pnpm exec wrangler pages deploy apps/showcase/out --project-name saas-maker-home --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-docs:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check docs deploy paths
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.before }}"
          if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed=false
          while IFS= read -r path; do
            case "$path" in
              apps/docs/*|docs/openapi/*|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|.github/workflows/ci.yml)
                changed=true
                break
                ;;
            esac
          done < <(git diff --name-only "$base" "${{ github.sha }}")

          echo "changed=$changed" >> "$GITHUB_OUTPUT"
      - name: Skip docs deploy
        if: steps.changes.outputs.changed != 'true'
        run: echo "No docs-owned paths changed; skipping saas-maker-docs deploy."
      - uses: pnpm/action-setup@v6
        if: steps.changes.outputs.changed == 'true'
        with:
          version: 10
      - uses: actions/setup-node@v6
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
        if: steps.changes.outputs.changed == 'true'
      - name: Build docs and generate llms.txt
        if: steps.changes.outputs.changed == 'true'
        run: pnpm build:docs && node apps/docs/scripts/generate-llms-txt.mjs
      - name: Deploy docs to Cloudflare Pages
        if: steps.changes.outputs.changed == 'true'
        run: pnpm exec wrangler pages deploy apps/docs/dist --project-name saas-maker-docs --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  publish-packages:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install
      - name: Build all packages
        run: pnpm -r --filter './packages/*' build
      - name: Publish packages with bumped versions
        run: |
          # Scan all package subdirectories recursively
          find packages -name "package.json" -not -path "*/node_modules/*" -not -path "*/dist/*" | while read pkg_json; do
            dir=$(dirname "$pkg_json")
            [ -f "$pkg_json" ] || continue

            is_private=$(node -p "try{require('./$pkg_json').private||false}catch(e){true}")
            [ "$is_private" = "true" ] && continue

            name=$(node -p "try{require('./$pkg_json').name}catch(e){''}")
            [ -z "$name" ] || [[ "$name" == *"undefined"* ]] && continue

            local_version=$(node -p "try{require('./$pkg_json').version}catch(e){'0.0.0'}")
            npm_version=$(npm view "$name" version 2>/dev/null || echo "0.0.0")

            if [ "$local_version" != "$npm_version" ]; then
              echo "Publishing $name@$local_version (npm has $npm_version)"
              cd "$dir"
              pnpm build 2>/dev/null || true
              npm publish --access public
              cd "$GITHUB_WORKSPACE"
            else
              echo "Skipping $name@$local_version (already at latest)"
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
