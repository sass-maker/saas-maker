name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build:bridge
      - run: pnpm mobile:export
      - run: pnpm mobile:export:ios

  ios-native:
    name: iOS Simulator build
    runs-on: macos-26
    timeout-minutes: 30
    env:
      CI: 1
      DEVELOPER_DIR: /Applications/Xcode_26.4.app/Contents/Developer
      EXPO_NO_TELEMETRY: 1
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate the native iOS project
        run: pnpm --filter @mobile-dev-cockpit/mobile exec expo prebuild --platform ios --no-install
      - name: Install iOS pods
        working-directory: apps/mobile/ios
        run: pod install
      - name: Compile for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -workspace apps/mobile/ios/MobileDevCockpit.xcworkspace \
            -scheme MobileDevCockpit \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
