name: CI

# Rollback references:
# - saasmaker-api (Worker): `wrangler versions rollback` from workers/api/,
#   or dash.cloudflare.com → Workers → saasmaker-api → Versions → "Rollback".
# - saasmaker-dashboard (Worker): `wrangler versions rollback` from
#   apps/cockpit/, or dash.cloudflare.com → Workers → saasmaker-dashboard.
# - saasmaker-droid (Worker): `wrangler versions rollback` from workers/droid/.
#   Internal worker — no public domain, no post-deploy smoke.
# - saas-maker-home (Pages): dash.cloudflare.com → Pages → saas-maker-home →
#   Deployments → "Rollback to this deployment".
# - saas-maker-packages (Pages): dash.cloudflare.com → Pages → saas-maker-packages →
#   Deployments → "Rollback to this deployment".

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_component:
        description: Production component to release after CI passes
        required: true
        type: choice
        options:
          - api
          - droid
          - cockpit
          - showcase
          - package-docs
          - packages

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm components:install
      - run: pnpm catalog:validate
      - run: pnpm catalog:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: node --test tests/foundry-catalog.test.mjs tests/foundry-observability.test.mjs ops/test/host-foundation.test.mjs
      - run: pnpm check:openapi
      - run: pnpm build:widget
      - run: pnpm -F @saas-maker/api typecheck
      - run: pnpm build:cockpit
      - run: pnpm build:showcase
      - run: pnpm build:docs
      - run: pnpm build:skills
      - run: pnpm components:check
      - run: pnpm test

  deploy-api:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' && inputs.release_component == 'api'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check API deploy paths
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.before }}"
          if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed=false
          while IFS= read -r path; do
            case "$path" in
              workers/api/*|internal/contracts/*|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|.github/workflows/ci.yml)
                changed=true
                break
                ;;
            esac
          done < <(git diff --name-only "$base" "${{ github.sha }}")

          echo "changed=$changed" >> "$GITHUB_OUTPUT"
      - name: Skip API deploy
        if: steps.changes.outputs.changed != 'true'
        run: echo "No API-owned paths changed; skipping saasmaker-api deploy."
      - uses: pnpm/action-setup@v6
        if: steps.changes.outputs.changed == 'true'
      - uses: actions/setup-node@v6
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: steps.changes.outputs.changed == 'true'
      - name: Deploy API to Cloudflare Workers
        if: steps.changes.outputs.changed == 'true'
        run: cd workers/api && pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Smoke production API and cockpit
        if: steps.changes.outputs.changed == 'true'
        run: pnpm smoke

  deploy-droid:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' && inputs.release_component == 'droid'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # saasmaker-droid is an internal Worker with no public custom domain.
    # No post-deploy smoke check is applicable — artifact-only exception.
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check Droid deploy paths
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.before }}"
          if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed=false
          while IFS= read -r path; do
            case "$path" in
              workers/droid/*|workers/droid/**|workers/api/migrations/*droid*|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|.github/workflows/ci.yml)
                changed=true
                break
                ;;
            esac
          done < <(git diff --name-only "$base" "${{ github.sha }}")

          echo "changed=$changed" >> "$GITHUB_OUTPUT"
      - name: Skip Droid deploy
        if: steps.changes.outputs.changed != 'true'
        run: echo "No Droid-owned paths changed; skipping saasmaker-droid deploy."
      - uses: pnpm/action-setup@v6
        if: steps.changes.outputs.changed == 'true'
      - uses: actions/setup-node@v6
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: steps.changes.outputs.changed == 'true'
      - name: Deploy Droid to Cloudflare Workers
        if: steps.changes.outputs.changed == 'true'
        run: pnpm -F @saas-maker/droid run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-cockpit:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' && inputs.release_component == 'cockpit'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check cockpit deploy paths
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.before }}"
          if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed=false
          while IFS= read -r path; do
            case "$path" in
              apps/cockpit/*|apps/cockpit/**|internal/contracts/*|packages/blocks/sdk/*|packages/blocks/sdk/**|packages/ui/*|packages/ui/**|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|.github/workflows/ci.yml)
                changed=true
                break
                ;;
            esac
          done < <(git diff --name-only "$base" "${{ github.sha }}")

          echo "changed=$changed" >> "$GITHUB_OUTPUT"
      - name: Skip cockpit deploy
        if: steps.changes.outputs.changed != 'true'
        run: echo "No cockpit-owned paths changed; skipping saasmaker-dashboard deploy."
      - uses: pnpm/action-setup@v6
        if: steps.changes.outputs.changed == 'true'
      - uses: actions/setup-node@v6
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: steps.changes.outputs.changed == 'true'
      - name: Deploy cockpit to Cloudflare Workers
        if: steps.changes.outputs.changed == 'true'
        run: pnpm -F @saas-maker/dashboard run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Smoke cockpit production
        if: steps.changes.outputs.changed == 'true'
        run: curl --fail --silent --show-error --location --output /dev/null --retry 3 --retry-delay 5 --max-time 30 https://app.sassmaker.com/

  deploy-landing:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' && inputs.release_component == 'showcase'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check home deploy paths
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.before }}"
          if [[ -z "$base" || "$base" =~ ^0+$ ]] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed=false
          while IFS= read -r path; do
            case "$path" in
              apps/showcase/*|catalog/*|packages/blocks/sdk/*|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|.github/workflows/ci.yml)
                changed=true
                break
                ;;
            esac
          done < <(git diff --name-only "$base" "${{ github.sha }}")

          echo "changed=$changed" >> "$GITHUB_OUTPUT"
      - name: Skip home deploy
        if: steps.changes.outputs.changed != 'true'
        run: echo "No home-owned paths changed; skipping saas-maker-home deploy."
      - uses: pnpm/action-setup@v6
        if: steps.changes.outputs.changed == 'true'
      - uses: actions/setup-node@v6
        if: steps.changes.outputs.changed == 'true'
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        if: steps.changes.outputs.changed == 'true'
      - run: pnpm build:showcase
        if: steps.changes.outputs.changed == 'true'
      - name: Deploy landing page to Cloudflare Pages
        # Astro emits to `dist/` (previously Next.js static export → `out/`).
        if: steps.changes.outputs.changed == 'true'
        run: pnpm exec wrangler pages deploy apps/showcase/dist --project-name saas-maker-home --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Smoke landing production
        if: steps.changes.outputs.changed == 'true'
        run: curl --fail --silent --show-error --location --output /dev/null --retry 3 --retry-delay 5 --max-time 20 https://sassmaker.com/

  deploy-package-docs:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' && inputs.release_component == 'package-docs'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:docs
      - name: Ensure the SaaS Maker package-docs project exists
        run: |
          if ! pnpm exec wrangler pages project list | grep -q 'saas-maker-packages'; then
            pnpm exec wrangler pages project create saas-maker-packages --production-branch main
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy package docs to Cloudflare Pages
        run: pnpm exec wrangler pages deploy apps/docs-blume/dist --project-name saas-maker-packages --branch main --commit-hash "${{ github.sha }}" --commit-dirty=false
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Smoke package docs and agent surfaces
        run: |
          curl --fail --silent --show-error --location --output /dev/null --retry 3 --retry-delay 5 --max-time 20 https://saas-maker-packages.pages.dev/sdk/app-health/
          curl --fail --silent --show-error --location --output /dev/null --retry 3 --retry-delay 5 --max-time 20 https://saas-maker-packages.pages.dev/app-health/install.json
          curl --fail --silent --show-error --location --output /dev/null --retry 3 --retry-delay 5 --max-time 20 https://saas-maker-packages.pages.dev/api/ai

  publish-packages:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch' && inputs.release_component == 'packages'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - name: Build all packages
        run: pnpm -r --filter './packages/*' build
      - name: Publish packages with bumped versions
        run: |
          # Scan all package subdirectories recursively
          find packages -name "package.json" -not -path "*/node_modules/*" -not -path "*/dist/*" | while read pkg_json; do
            dir=$(dirname "$pkg_json")
            [ -f "$pkg_json" ] || continue

            is_private=$(node -p "try{require('./$pkg_json').private||false}catch(e){true}")
            [ "$is_private" = "true" ] && continue

            name=$(node -p "try{require('./$pkg_json').name}catch(e){''}")
            [ -z "$name" ] || [[ "$name" == *"undefined"* ]] && continue

            local_version=$(node -p "try{require('./$pkg_json').version}catch(e){'0.0.0'}")
            npm_version=$(npm view "$name" version 2>/dev/null || echo "0.0.0")

            if [ "$local_version" != "$npm_version" ]; then
              echo "Publishing $name@$local_version (npm has $npm_version)"
              cd "$dir"
              pnpm build 2>/dev/null || true
              npm publish --access public
              cd "$GITHUB_WORKSPACE"
            else
              echo "Skipping $name@$local_version (already at latest)"
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
