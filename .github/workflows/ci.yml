name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm check:openapi
      - run: pnpm build:types
      - run: pnpm build:db
      - run: pnpm build:widget
      - run: pnpm build:analytics-ui
      - run: cd workers/api && npx tsc --noEmit
      - run: pnpm build:dashboard
      - run: pnpm test

  deploy-api:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm build:types
      - run: pnpm build:db
      - name: Deploy API to Cloudflare Workers
        run: cd workers/api && pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-landing:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm build:landing
      - name: Deploy landing page to Cloudflare Pages
        run: pnpm exec wrangler pages deploy apps/landing-page/out --project-name saasmaker-landing --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-docs:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - name: Build docs and generate llms.txt
        run: pnpm build:docs && node apps/docs/scripts/generate-llms-txt.mjs
      - name: Deploy docs to Cloudflare Pages
        run: pnpm exec wrangler pages deploy apps/docs/dist --project-name saasmaker-docs --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  publish-packages:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install
      - name: Build all packages
        run: pnpm -r --filter './packages/*' build
      - name: Publish packages with bumped versions
        run: |
          # Scan all package subdirectories recursively
          find packages -name "package.json" -not -path "*/node_modules/*" -not -path "*/dist/*" | while read pkg_json; do
            dir=$(dirname "$pkg_json")
            [ -f "$pkg_json" ] || continue

            is_private=$(node -p "try{require('./$pkg_json').private||false}catch(e){true}")
            [ "$is_private" = "true" ] && continue

            name=$(node -p "try{require('./$pkg_json').name}catch(e){''}")
            [ -z "$name" ] || [[ "$name" == *"undefined"* ]] && continue

            local_version=$(node -p "try{require('./$pkg_json').version}catch(e){'0.0.0'}")
            npm_version=$(npm view "$name" version 2>/dev/null || echo "0.0.0")

            if [ "$local_version" != "$npm_version" ]; then
              echo "Publishing $name@$local_version (npm has $npm_version)"
              cd "$dir"
              pnpm build 2>/dev/null || true
              npm publish --access public
              cd "$GITHUB_WORKSPACE"
            else
              echo "Skipping $name@$local_version (already at latest)"
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
