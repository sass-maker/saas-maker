name: Foundry Weekly Quality Check (reusable)

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "22"

permissions:
  contents: read

jobs:
  quality:
    name: Read-only quality evidence
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
      - name: Install locked dependencies
        run: |
          pnpm install --frozen-lockfile --ignore-scripts
          pnpm components:install
      - name: Validate canonical catalog
        run: |
          pnpm catalog:validate
          pnpm catalog:check
      - name: Verify Foundry safety contracts
        run: node --test tests/foundry-catalog.test.mjs tests/foundry-observability.test.mjs ops/test/host-foundation.test.mjs
      - name: Build public surfaces
        run: |
          pnpm build:showcase
          pnpm build:docs
          pnpm build:skills
      - name: Typecheck private cockpit
        run: |
          pnpm --dir packages/ui build
          pnpm --dir apps/cockpit typecheck
      - name: Run imported component checks
        run: pnpm components:check
      - name: Run repository tests
        run: pnpm test
      - name: Dependency audit
        run: pnpm audit --prod
        continue-on-error: true
      - name: Publish summary
        if: always()
        run: |
          {
            echo '## Foundry weekly quality evidence'
            echo
            echo '- Read-only: no formatting, dependency additions, commits, pushes, deploys, or migrations.'
            echo '- Catalog, host safety, observability contracts, public builds, cockpit types, tests, and production dependency audit were evaluated.'
          } >> "$GITHUB_STEP_SUMMARY"

  lighthouse:
    name: Optional Lighthouse evidence
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: vars.DEPLOYMENT_URL != ''
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Run repository-pinned Lighthouse
        env:
          DEPLOYMENT_URL: ${{ vars.DEPLOYMENT_URL }}
        run: pnpm exec lighthouse "$DEPLOYMENT_URL" --output=json --output-path=./lighthouse-results.json --chrome-flags='--headless --no-sandbox'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-report
          path: lighthouse-results.json
          if-no-files-found: ignore
          retention-days: 30
