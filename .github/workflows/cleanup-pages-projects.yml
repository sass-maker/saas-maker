name: Cleanup redundant Pages projects

# One-off workflow. Manually dispatched.
# Deletes the 4 *-landing.pages.dev projects orphaned by the single-deploy
# Worker overlay pattern. Delete this file once it has run successfully.

on:
  workflow_dispatch:

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Delete redundant Pages projects
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -u
          projects=(
            linkchat-landing
            open-historia-landing
            resume-tailor-landing
            significanthobbies-landing
          )
          fail=0
          for p in "${projects[@]}"; do
            echo "::group::Delete $p"
            resp=$(curl -sS -o /tmp/body -w "%{http_code}" \
              -X DELETE \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/$p")
            echo "HTTP $resp"
            cat /tmp/body
            echo
            if [ "$resp" != "200" ]; then fail=1; fi
            echo "::endgroup::"
          done
          exit $fail
