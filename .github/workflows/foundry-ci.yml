name: Foundry CI
on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: '22'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: |
          pnpm install --frozen-lockfile
          pnpm components:install

      - name: Validate canonical catalog and host safety
        run: |
          pnpm catalog:validate
          pnpm catalog:check
          node --test tests/foundry-catalog.test.mjs tests/foundry-observability.test.mjs ops/test/host-foundation.test.mjs

      - name: Run Lint
        run: pnpm run lint --if-present

      - name: Type Check
        run: pnpm run typecheck --if-present

      - name: Run Tests
        run: pnpm run test --if-present

      - name: Run imported component checks
        run: pnpm components:check
