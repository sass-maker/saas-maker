name: Copy Cloudflare secrets to portfolio

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
      - name: Copy repository secrets
        env:
          GH_TOKEN: ${{ secrets.MIGRATION_GH_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          printf '%s' "$CLOUDFLARE_API_TOKEN" | gh secret set CLOUDFLARE_API_TOKEN --repo sarthakagrawal927/portfolio
          printf '%s' "$CLOUDFLARE_ACCOUNT_ID" | gh secret set CLOUDFLARE_ACCOUNT_ID --repo sarthakagrawal927/portfolio
