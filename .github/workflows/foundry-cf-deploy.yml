name: Foundry — Cloudflare Deploy

# Reusable workflow. Pin via `@v1` from consuming repos:
#   uses: sass-maker/saas-maker/.github/workflows/foundry-cf-deploy.yml@v1
on:
  workflow_call:
    inputs:
      worker_name:
        required: true
        type: string
      wrangler_config_path:
        required: false
        type: string
        default: wrangler.toml
      working_directory:
        required: false
        type: string
        default: .
      node_version:
        required: false
        type: string
        default: '22'
      pnpm_version:
        required: false
        type: string
        default: '10'
      build_command:
        required: false
        type: string
        default: pnpm build
      dry_run:
        required: false
        type: boolean
        default: false
      smoke_url:
        required: false
        type: string
        default: ''
      smoke_max_attempts:
        required: false
        type: number
        default: 12
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: false
  workflow_dispatch:
    inputs:
      worker_name:
        required: true
        type: string
      wrangler_config_path:
        required: false
        type: string
        default: wrangler.toml
      working_directory:
        required: false
        type: string
        default: .
      node_version:
        required: false
        type: string
        default: '22'
      pnpm_version:
        required: false
        type: string
        default: '10'
      build_command:
        required: false
        type: string
        default: pnpm build
      dry_run:
        required: false
        type: boolean
        default: false
      smoke_url:
        required: false
        type: string
        default: ''
      smoke_max_attempts:
        required: false
        type: number
        default: 12
jobs:
  deploy:
    name: Deploy ${{ inputs.worker_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ inputs.pnpm_version }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ inputs.working_directory }}

      - name: Build
        if: inputs.build_command != ''
        run: ${{ inputs.build_command }}
        working-directory: ${{ inputs.working_directory }}

      - name: Wrangler deploy
        if: inputs.dry_run == false
        shell: bash
        run: |
          set -eo pipefail
          if [[ -n "${{ inputs.wrangler_config_path }}" ]]; then
            pnpm exec wrangler deploy --config "${{ inputs.wrangler_config_path }}"
          else
            pnpm exec wrangler deploy
          fi
        working-directory: ${{ inputs.working_directory }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Wrangler dry-run
        if: inputs.dry_run == true
        shell: bash
        run: |
          set -eo pipefail
          if [[ -n "${{ inputs.wrangler_config_path }}" ]]; then
            pnpm exec wrangler deploy --config "${{ inputs.wrangler_config_path }}" --dry-run
          else
            pnpm exec wrangler deploy --dry-run
          fi
        working-directory: ${{ inputs.working_directory }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Post-deploy smoke
        if: inputs.smoke_url != '' && inputs.dry_run == false
        shell: bash
        run: |
          set -eo pipefail
          url="${{ inputs.smoke_url }}"
          attempts=${{ inputs.smoke_max_attempts }}
          for i in $(seq 1 $attempts); do
            echo "[smoke $i/$attempts] curl -sSI $url"
            status=$(curl -sSI -o /dev/null -w '%{http_code}' --max-time 15 "$url" || echo "000")
            if [[ "$status" =~ ^2 ]]; then
              echo "[smoke] OK ($status)"
              exit 0
            fi
            echo "[smoke] got $status — retrying in 5s"
            sleep 5
          done
          echo "::error::Smoke check failed for $url after $attempts attempts"
          exit 1
