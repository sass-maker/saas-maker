name: Fleet Production Smoke

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Probe active production frontends
        run: pnpm run fleet:prod-smoke -- --fail-on-failure

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: fleet-production-smoke
          path: .symphony/fleet-production-smoke/
